<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线选股共振工具 | 捕捞季节 × 神龙筹码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 28px; font-weight: 700; color: #58a6ff; margin-bottom: 8px; }
  .header p { color: #8b949e; font-size: 14px; }

  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 28px; margin-bottom: 24px; }
  .card-title { font-size: 16px; font-weight: 600; color: #e6edf3; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

  .input-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .input-row input { flex: 1; min-width: 180px; padding: 12px 16px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 16px; outline: none; transition: border-color 0.2s; }
  .input-row input:focus { border-color: #58a6ff; }
  .input-row input::placeholder { color: #484f58; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-secondary { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
  .btn-secondary:hover { background: #30363d; color: #e6edf3; }

  .signal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .signal-item { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .signal-label { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
  .signal-value { font-size: 20px; font-weight: 700; }
  .signal-value.green { color: #3fb950; }
  .signal-value.red { color: #f85149; }
  .signal-value.yellow { color: #d29922; }
  .signal-value.gray { color: #8b949e; }

  .signal-section { margin-top: 20px; }
  .signal-section-title { font-size: 13px; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  .共振-box { border-radius: 8px; padding: 16px; text-align: center; font-size: 18px; font-weight: 700; margin-top: 20px; }
  .共振-是 { background: rgba(63,185,80,0.15); border: 1px solid #3fb950; color: #3fb950; }
  .共振-否 { background: rgba(248,81,73,0.1); border: 1px solid #f85149; color: #f85149; }

  .condition-list { list-style: none; margin-top: 12px; }
  .condition-list li { padding: 8px 0; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  .condition-list li:last-child { border-bottom: none; }
  .cond-name { color: #8b949e; }
  .cond-val { font-weight: 600; }
  .cond-val.ok { color: #3fb950; }
  .cond-val.fail { color: #f85149; }
  .cond-val.warn { color: #d29922; }

  .loading { text-align: center; padding: 40px; color: #8b949e; }
  .loading::after { content: '...'; animation: dots 1.5s infinite; }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

  .error-msg { background: rgba(248,81,73,0.1); border: 1px solid #f85149; border-radius: 8px; padding: 16px; color: #f85149; text-align: center; }
  .footer { text-align: center; padding: 30px; color: #484f58; font-size: 12px; }

  .grid-full { grid-column: 1 / -1; }
  .flex-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .flex-row .signal-item { flex: 1; min-width: 200px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(63,185,80,0.2); color: #3fb950; }
  .badge-red { background: rgba(248,81,73,0.2); color: #f85149; }
  .badge-yellow { background: rgba(210,153,34,0.2); color: #d29922; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>📈 在线选股共振工具</h1>
    <p>「捕捞季节 × 神龙筹码」双指标共振 · Tushare Pro 数据</p>
  </div>

  <!-- 查询区 -->
  <div class="card">
    <div class="card-title">🔍 查询个股信号</div>
    <div class="input-row">
      <input type="text" id="stockCode" placeholder="输入股票代码，如 000001" value="000001" maxlength="6">
      <input type="text" id="stockCode2" placeholder="输入股票代码，如 600519" maxlength="6" style="display:none">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="querySignal()">查询信号</button>
      <button class="btn btn-secondary" onclick="queryMultiple()">+ 对比两只</button>
    </div>
  </div>

  <!-- 结果区 -->
  <div id="resultArea" style="display:none">
    <div id="signalCard"></div>
  </div>

  <!-- 批量选股区 -->
  <div class="card">
    <div class="card-title">🎯 双指标共振选股</div>
    <div class="input-row">
      <select id="screenPool" style="flex:1; padding:12px 16px; background:#0d1117; border:1px solid #30363d; border-radius:8px; color:#e6edf3; font-size:14px;">
        <option value="hs300">沪深300成分</option>
        <option value="zz500">中证500成分</option>
        <option value="gem">创业板</option>
        <option value="all">全市场A股</option>
      </select>
      <select id="screenVersion" style="flex:1; padding:12px 16px; background:#0d1117; border:1px solid #30363d; border-radius:8px; color:#e6edf3; font-size:14px;">
        <option value="basic">基础版（新手）</option>
        <option value="advanced">进阶版（提高胜率）</option>
      </select>
      <input type="number" id="screenLimit" value="20" min="1" max="100" style="width:80px; padding:12px 8px; background:#0d1117; border:1px solid #30363d; border-radius:8px; color:#e6edf3; font-size:14px;">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="screenStocks()">🚀 开始选股</button>
      <button class="btn btn-secondary" onclick="document.getElementById('screenResult').innerHTML=''">清空结果</button>
    </div>
    <div id="screenResult" style="margin-top:20px;"></div>
  </div>

  <div class="footer">
    <p>数据来源: Tushare Pro · 指标公式: 捕捞季节 + 神龙筹码</p>
    <p style="margin-top:6px;">⚠️ 仅供参考，不构成投资建议</p>
  </div>
</div>

<script>
const API = 'https://pure-ambition-production-b39f.up.railway.app';

function fmt(v, decimals=2) {
  if (v === null || v === undefined || v === '') return '-';
  if (typeof v === 'boolean') return v ? '✅' : '❌';
  if (typeof v === 'number') return Number(v).toFixed(decimals);
  return v;
}

function boolBadge(v) {
  if (v === true || v === 'true') return '<span class="badge badge-green">✅ 是</span>';
  if (v === false || v === 'false') return '<span class="badge badge-red">❌ 否</span>';
  return '<span class="badge badge-yellow">' + v + '</span>';
}

function renderSignal(data) {
  const s = data.signals;
  const basic = data.basic共振;
  const advanced = data.advanced共振;
  const sell = data.sell;

  return `
  <div class="card">
    <div class="card-title" style="justify-content:space-between;">
      <span>📊 ${data.code} <span style="font-weight:400;color:#8b949e;font-size:14px;">${data.ts_code}</span></span>
      <span style="font-size:12px;color:#484f58;">${s.日期}</span>
    </div>

    <div class="共振-box ${basic ? '共振-是' : '共振-否'}">
      ${basic ? '🎯 基础版共振信号' : '❌ 暂无基础版共振'}
      <div style="font-size:13px;margin-top:6px;font-weight:400;">进阶版: ${boolBadge(advanced)}</div>
    </div>

    <div class="signal-section">
      <div class="signal-section-title">🐟 捕捞季节指标</div>
      <ul class="condition-list">
        <li><span class="cond-name">DIF</span><span class="cond-val">${fmt(s.捕捞_DIF,4)}</span></li>
        <li><span class="cond-name">DEA</span><span class="cond-val">${fmt(s.捕捞_DEA,4)}</span></li>
        <li><span class="cond-name">MACD柱</span><span class="cond-val ${s.捕捞_HIST>0?'ok':'fail'}">${fmt(s.捕捞_HIST,4)}</span></li>
        <li><span class="cond-name">金叉信号</span>${boolBadge(s.捕捞_金叉)}</li>
        <li><span class="cond-name">红柱趋势</span>${boolBadge(s.捕捞_红柱趋势)}</li>
        <li><span class="cond-name">彩柱数 (≥2)</span><span class="cond-val ${s.捕捞_彩柱数>=2?'ok':'fail'}">${s.捕捞_彩柱数}</span></li>
      </ul>
    </div>

    <div class="signal-section">
      <div class="signal-section-title">🐉 神龙筹码指标</div>
      <ul class="condition-list">
        <li><span class="cond-name">红线 (%)</span><span class="cond-val">${fmt(s.神龙_Red_pct)}</span></li>
        <li><span class="cond-name">橙线 (%)</span><span class="cond-val">${fmt(s.神龙_Orange_pct)}</span></li>
        <li><span class="cond-name">紫线 (%)</span><span class="cond-val">${fmt(s.神龙_Purple_pct)}</span></li>
        <li><span class="cond-name">红线金叉</span>${boolBadge(s.神龙_红线金叉)}</li>
        <li><span class="cond-name">红柱上升</span>${boolBadge(s.神龙_红柱上升)}</li>
        <li><span class="cond-name">套牢比例 (&lt;50%)</span><span class="cond-val ${s.神龙_套牢比例<0.5?'ok':'fail'}">${fmt(s.神龙_套牢比例*100)}%</span></li>
      </ul>
    </div>

    <div class="signal-section">
      <div class="signal-section-title">📐 趋势与量能</div>
      <ul class="condition-list">
        <li><span class="cond-name">最新价</span><span class="cond-val green">¥${s.最新价}</span></li>
        <li><span class="cond-name">股价站上MA20</span>${boolBadge(s.股价站上MA20)}</li>
        <li><span class="cond-name">MA20向上</span>${boolBadge(s.MA20向上)}</li>
        <li><span class="cond-name">量能放大</span>${boolBadge(s.量能放大)}</li>
      </ul>
    </div>

    <div class="signal-section">
      <div class="signal-section-title">🚨 卖出信号</div>
      <ul class="condition-list">
        <li><span class="cond-name">跌破MA20预警</span>${boolBadge(sell['触发卖出3_跌破MA20'])}</li>
      </ul>
    </div>
  </div>`;
}

async function querySignal() {
  const code = document.getElementById('stockCode').value.trim();
  if (!code) return alert('请输入股票代码');
  document.getElementById('resultArea').style.display = 'block';
  document.getElementById('signalCard').innerHTML = '<div class="loading">加载中</div>';

  try {
    const r = await fetch(`${API}/api/signal/${code}`);
    if (!r.ok) { document.getElementById('signalCard').innerHTML = '<div class="error-msg">获取失败，请检查代码是否正确</div>'; return; }
    const data = await r.json();
    document.getElementById('signalCard').innerHTML = renderSignal(data);
  } catch(e) {
    document.getElementById('signalCard').innerHTML = '<div class="error-msg">网络错误，请稍后重试</div>';
  }
}

async function screenStocks() {
  const pool = document.getElementById('screenPool').value;
  const version = document.getElementById('screenVersion').value;
  const limit = parseInt(document.getElementById('screenLimit').value);
  const el = document.getElementById('screenResult');
  el.innerHTML = '<div class="loading">正在筛选（约需3-5分钟）</div>';

  try {
    const r = await fetch(`${API}/api/screen?version=${version}&pool=${pool}&limit=${limit}`);
    const data = await r.json();
    if (!data.results || data.results.length === 0) {
      el.innerHTML = '<div style="text-align:center;color:#8b949e;padding:30px;">未找到符合条件的股票</div>';
      return;
    }
    let html = `<div style="margin-bottom:12px;color:#8b949e;font-size:13px;">找到 <strong style="color:#58a6ff">${data.matched_count}</strong> 只共振股票：</div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">';
    for (const item of data.results) {
      const s = item.信号;
      html += `<div style="background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:14px;cursor:pointer;" onclick="document.getElementById('stockCode').value='${item.code}';querySignal();window.scrollTo({top:0,behavior:'smooth'});">
        <div style="font-size:15px;font-weight:700;margin-bottom:8px;">${item.code} <span style="font-size:12px;color:#3fb950;font-weight:600;">¥${s.最新价}</span></div>
        <div style="font-size:12px;color:#8b949e;">🐟${boolBadge(s.捕捞_金叉)} 🐉${boolBadge(s.神龙_红线金叉)}</div>
        <div style="font-size:11px;color:#484f58;margin-top:6px;">彩柱${s.捕捞_彩柱数} | 套牢${fmt(s.神龙_套牢比例*100)}%</div>
      </div>`;
    }
    html += '</div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="error-msg">网络错误，请稍后重试</div>';
  }
}

// 回车查询
document.getElementById('stockCode').addEventListener('keydown', e => { if (e.key === 'Enter') querySignal(); });

// 默认加载平安银行
querySignal();
</script>
</body>
</html>
