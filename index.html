<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选股共振工具 - 捕捞季节 + 神龙筹码</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #00d4ff;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 16px;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-secondary {
            background: #333;
            color: #fff;
        }
        .btn-secondary:hover { background: #444; }
        .btn-secondary.active {
            background: #667eea;
        }

        .resonance-count {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .resonance-count span {
            color: #00d4ff;
            font-weight: bold;
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .stock-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .stock-card.resonance {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        .stock-card.resonance .共振标签 {
            display: inline-block;
            background: #00d4ff;
            color: #000;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .stock-name {
            font-size: 20px;
            font-weight: bold;
        }
        .stock-code {
            color: #888;
            font-size: 14px;
        }
        .stock-price {
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
        }
        .indicator-row {
            display: flex;
            gap: 15px;
            margin: 10px 0;
        }
        .indicator-box {
            flex: 1;
            background: #1a1a2e;
            border-radius: 8px;
            padding: 12px;
        }
        .indicator-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        .indicator-value {
            font-size: 16px;
            font-weight: bold;
        }
        .signal-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 5px;
        }
        .signal-true { background: #00d4ff; color: #000; }
        .signal-false { background: #555; color: #888; }
        .recommend {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
        }
        .recommend-buy { background: #00d4ff; color: #000; }
        .recommend-watch { background: #333; color: #888; }

        .filter-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .filter-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
        .filter-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-tag {
            padding: 8px 15px;
            border-radius: 20px;
            background: #333;
            cursor: pointer;
            font-size: 14px;
        }
        .filter-tag:hover { background: #444; }
        .filter-tag.active { background: #667eea; }

        .advanced-filters {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        .filter-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
        .filter-item:last-child { border: none; }
        .filter-name { color: #888; }
        .filter-status { font-weight: bold; }
        .filter-pass { color: #00d4ff; }
        .filter-fail { color: #ff6b6b; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .error {
            background: #ff6b6b;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .stock-grid { grid-template-columns: 1fr; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 选股共振工具</h1>
        <p class="subtitle">捕捞季节 + 神龙筹码 双指标共振</p>

        <div class="filter-section">
            <div class="filter-title">筛选模式</div>
            <div class="filter-tags">
                <button class="filter-tag active" data-mode="basic" onclick="setMode('basic')">📋 基础版</button>
                <button class="filter-tag" data-mode="advanced" onclick="setMode('advanced')">⚡ 进阶版（提高胜率）</button>
            </div>
            <div class="advanced-filters" id="advancedFilters" style="display:none;">
                <div class="filter-item">
                    <span class="filter-name">📈 趋势过滤（站上20日均线+均线向上）</span>
                    <span class="filter-status" id="filterTrend">—</span>
                </div>
                <div class="filter-item">
                    <span class="filter-name">🔗 筹码过滤（套牢比例&lt;50%）</span>
                    <span class="filter-status" id="filterChip">—</span>
                </div>
                <div class="filter-item">
                    <span class="filter-name">📊 量能过滤（近3日成交量温和放大）</span>
                    <span class="filter-status" id="filterVolume">—</span>
                </div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="stockInput" placeholder="输入股票代码，多个用逗号分隔，如：600519,000858,002594">
            <button class="btn-primary" onclick="analyzeStocks()">🔍 分析</button>
            <button class="btn-secondary" onclick="demoStocks()">📈 演示股票</button>
        </div>

        <div id="errorBox" style="display:none;" class="error"></div>

        <div class="resonance-count" id="resonanceCount" style="display:none;">
            共振股票数量：<span id="countNum">0</span>
        </div>

        <div id="results" class="stock-grid"></div>
    </div>

    <script>
        let currentMode = 'basic';
        const API_BASE = '';  // 空字符串=同源，部署时填入后端地址

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            document.getElementById('advancedFilters').style.display = mode === 'advanced' ? 'block' : 'none';
        }

        async function analyzeStocks() {
            const input = document.getElementById('stockInput').value.trim();
            if (!input) return alert('请输入股票代码');
            showLoading();

            try {
                const codes = input.split(',').map(c => c.trim()).filter(c => c);
                const codesStr = codes.join(',');
                const endpoint = codes.length === 1 ? `/api/analyze/${codes[0]}?advanced=${currentMode === 'advanced'}` : `/api/batch?codes=${codesStr}&advanced=${currentMode === 'advanced'}`;

                const res = await fetch(API_BASE + endpoint);
                const data = await res.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                const stocks = data.resonance_stocks || (data.basic共振 !== undefined ? [data] : []);
                displayResults(stocks, data);
            } catch (err) {
                showError('请求失败: ' + err.message);
            }
        }

        async function demoStocks() {
            document.getElementById('stockInput').value = '600519,000858,002594,300750,600036,601318,000333,002415,600276,000001';
            await analyzeStocks();
        }

        function showLoading() {
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('results').innerHTML = '<div class="loading">加载中...</div>';
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
            document.getElementById('results').innerHTML = '';
        }

        function displayResults(stocks, rawData) {
            const container = document.getElementById('results');
            const countBox = document.getElementById('resonanceCount');
            const countNum = document.getElementById('countNum');

            const allStocks = rawData.resonance_stocks || [];
            countNum.textContent = allStocks.length;
            countBox.style.display = 'block';

            if (allStocks.length === 0) {
                container.innerHTML = '<div class="loading">没有找到符合条件的股票</div>';
                return;
            }

            // 按共振股票优先排序
            const resonance = allStocks.filter(s => s.basic共振);
            const noResonance = allStocks.filter(s => !s.basic共振);
            const sorted = [...resonance, ...noResonance];

            container.innerHTML = sorted.map(s => {
                const p = s.pledge || {};
                const sh = s.shenlong || {};
                const ar = s.advanced_result || {};
                const isRes = s.basic共振;
                const isAdvanced = currentMode === 'advanced';

                // 构建筛选结果行
                let filterRows = '';
                if (isAdvanced && isRes) {
                    filterRows = `
                        <div class="advanced-filters">
                            <div class="filter-item">
                                <span class="filter-name">趋势过滤</span>
                                <span class="filter-status ${ar.trend_filter ? 'filter-pass' : 'filter-fail'}">${ar.trend_filter ? '✓ 通过' : '✗ 未通过'}</span>
                            </div>
                            <div class="filter-item">
                                <span class="filter-name">筹码过滤</span>
                                <span class="filter-status ${ar.chip_filter ? 'filter-pass' : 'filter-fail'}">${ar.chip_filter ? '✓ 通过' : '✗ 未通过'}</span>
                            </div>
                            <div class="filter-item">
                                <span class="filter-name">量能过滤</span>
                                <span class="filter-status ${ar.volume_filter ? 'filter-pass' : 'filter-fail'}">${ar.volume_filter ? '✓ 通过' : '✗ 未通过'}</span>
                            </div>
                        </div>
                    `;
                }

                return `
                <div class="stock-card ${isRes ? 'resonance' : ''}">
                    ${isRes ? '<span class="共振标签">⚡ 共振信号</span>' : ''}
                    <div class="stock-header">
                        <div>
                            <div class="stock-name">${s.code}</div>
                            <div class="stock-code">${s.date}</div>
                        </div>
                        <div class="stock-price">¥${s.close}</div>
                    </div>

                    <div class="indicator-row">
                        <div class="indicator-box">
                            <div class="indicator-title">🎣 捕捞季节</div>
                            <div>金叉信号: <span class="signal-tag ${p.golden_cross ? 'signal-true' : 'signal-false'}">${p.golden_cross ? '✓ 金叉' : '✗ 未金叉'}</span></div>
                            <div>红柱趋势: <span class="signal-tag ${p.red_trend ? 'signal-true' : 'signal-false'}">${p.red_trend ? '✓ 上升' : '✗ 下降'}</span></div>
                            <div>彩柱数: ${p.color_bars || 0} ≥ 2</div>
                            <div>MA5: ${p.ma5 ? p.ma5.toFixed(2) : '-'}, MA20: ${p.ma20 ? p.ma20.toFixed(2) : '-'}</div>
                        </div>
                        <div class="indicator-box">
                            <div class="indicator-title">🐉 神龙筹码</div>
                            <div>趋势信号: <span class="signal-tag ${sh.trend_signal ? 'signal-true' : 'signal-false'}">${sh.trend_signal ? '✓ 上穿' : '✗ 未上穿'}</span></div>
                            <div>持股区间: <span class="signal-tag ${sh.hold_zone ? 'signal-true' : 'signal-false'}">${sh.hold_zone ? '✓ 上升' : '✗ 下降'}</span></div>
                            <div>套牢比例: ${((sh.avg_trapped_rate || 0) * 100).toFixed(0)}%</div>
                            <div>红线: ${sh.red_line || '-'}, 橙线: ${sh.orange_line || '-'}</div>
                        </div>
                    </div>
                    ${filterRows}
                    <div class="recommend ${isRes ? 'recommend-buy' : 'recommend-watch'}">${isRes ? '✅ 买入信号' : '⏸️ 观望'}</div>
                </div>
                `;
            }).join('');
        }

        // 回车搜索
        document.getElementById('stockInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') analyzeStocks();
        });
    </script>
</body>
</html>
