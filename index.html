<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线选股共振工具 | 捕捞季节 × 神龙筹码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .container { max-width: 960px; margin: 0 auto; padding: 40px 20px; }

  .header { text-align: center; margin-bottom: 36px; }
  .header h1 { font-size: 26px; font-weight: 700; color: #58a6ff; margin-bottom: 8px; }
  .header p { color: #8b949e; font-size: 14px; }

  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 28px; margin-bottom: 20px; }
  .card-title { font-size: 15px; font-weight: 600; color: #e6edf3; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

  .input-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .input-row input, .input-row select { flex: 1; min-width: 160px; padding: 11px 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .input-row input:focus, .input-row select:focus { border-color: #58a6ff; }
  .input-row input::placeholder { color: #484f58; }

  .btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .btn { padding: 11px 22px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-primary:disabled { background: #1a4731; color: #4a7a5a; cursor: not-allowed; }
  .btn-secondary { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
  .btn-secondary:hover { background: #30363d; color: #e6edf3; }

  .progress-bar { height: 6px; background: #21262d; border-radius: 3px; margin-top: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #238636, #3fb950); border-radius: 3px; transition: width 0.4s ease; width: 0%; }

  .loading { text-align: center; padding: 30px; color: #8b949e; font-size: 14px; }
  .loading::after { content: '...'; animation: dots 1.5s infinite; }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

  .error-msg { background: rgba(248,81,73,0.1); border: 1px solid #f85149; border-radius: 8px; padding: 14px; color: #f85149; text-align: center; font-size: 14px; }
  .success-box { background: rgba(63,185,80,0.1); border: 1px solid #3fb950; border-radius: 8px; padding: 14px; color: #3fb950; text-align: center; font-size: 14px; }

  .result-card { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 16px; cursor: pointer; transition: border-color 0.2s; }
  .result-card:hover { border-color: #58a6ff; }
  .result-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .result-code { font-size: 17px; font-weight: 700; }
  .result-name { font-size: 13px; color: #8b949e; margin-left: 8px; }
  .result-price { font-size: 17px; font-weight: 700; color: #3fb950; }
  .result-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .badge-green { background: rgba(63,185,80,0.2); color: #3fb950; }
  .badge-red { background: rgba(248,81,73,0.15); color: #f85149; }
  .badge-yellow { background: rgba(210,153,34,0.15); color: #d29922; }
  .result-signals { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 12px; }
  .sig-item { background: #161b22; border-radius: 6px; padding: 8px 10px; font-size: 12px; }
  .sig-label { color: #8b949e; margin-bottom: 2px; }
  .sig-val { font-weight: 600; }

  .stock-detail-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-content { background: #161b22; border: 1px solid #30363d; border-radius: 14px; padding: 28px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-close { background: none; border: none; color: #8b949e; font-size: 22px; cursor: pointer; }
  .cond-list { list-style: none; }
  .cond-list li { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #21262d; font-size: 14px; }
  .cond-list li:last-child { border-bottom: none; }
  .cond-name { color: #8b949e; }
  .cond-val { font-weight: 700; }
  .cond-val.ok { color: #3fb950; }
  .cond-val.fail { color: #f85149; }
  .cond-val.neutral { color: #d29922; }

  .共振-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; margin-top: 16px; }
  .共振-yes { background: rgba(63,185,80,0.2); color: #3fb950; border: 1px solid #3fb950; }
  .共振-no { background: rgba(248,81,73,0.1); color: #f85149; border: 1px solid #f85149; }

  .section-title { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 10px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media(max-width:600px){ .grid-2 { grid-template-columns: 1fr; } }

  .footer { text-align: center; padding: 30px; color: #484f58; font-size: 12px; }
  .hint { font-size: 12px; color: #484f58; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>📈 在线选股共振工具</h1>
    <p>「捕捞季节 × 神龙筹码」双指标共振 · 自动筛选</p>
  </div>

  <!-- 自动选股 -->
  <div class="card">
    <div class="card-title">🎯 双指标共振自动选股（点击开始，无需输入代码）</div>
    <div class="input-row">
      <select id="screenPool">
        <option value="all">全市场A股</option>
        <option value="gem">创业板</option>
        <option value="hs300">沪深300</option>
        <option value="zz500">中证500</option>
      </select>
      <select id="screenVersion">
        <option value="basic">基础版（新手）</option>
        <option value="advanced">进阶版（胜率更高）</option>
      </select>
      <select id="screenLimit" style="flex:0 0 100px;">
        <option value="10">10只</option>
        <option value="20" selected>20只</option>
        <option value="50">50只</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="screenBtn" onclick="startScreen()">🚀 自动选股</button>
      <button class="btn btn-secondary" onclick="clearResults()">清空</button>
    </div>
    <div id="screenStatus" style="display:none;margin-top:16px;"></div>
    <div class="progress-bar" id="progressBar" style="display:none;">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="resultsArea" style="margin-top:20px;"></div>
  </div>

  <!-- 单股查询 -->
  <div class="card">
    <div class="card-title">🔍 查询单只股票</div>
    <div class="input-row">
      <input type="text" id="stockCode" placeholder="输入股票代码，如 000001" maxlength="6">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="querySignal()">查询</button>
    </div>
    <div id="singleResult" style="margin-top:16px;"></div>
  </div>

  <div class="footer">
    <p>数据来源: 东方财富实时行情 + Tushare Pro 技术指标</p>
    <p style="margin-top:6px;">⚠️ 仅供参考，不构成投资建议</p>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="stock-detail-modal" id="detailModal" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const API = 'https://pure-ambition-production-b39f.up.railway.app';
let currentJobId = null;
let pollTimer = null;

function fmt(v, d=2) {
  if (v === null || v === undefined || v === '') return '-';
  if (typeof v === 'boolean') return v ? '✅' : '❌';
  if (typeof v === 'number') return Number(v).toFixed(d);
  return v;
}

function badge(v) {
  if (v === true || v === 'true') return '<span class="badge badge-green">✅</span>';
  if (v === false || v === 'false') return '<span class="badge badge-red">❌</span>';
  return '<span class="badge badge-yellow">' + v + '</span>';
}

function boolText(v) {
  if (v === true || v === 'true') return '<span style="color:#3fb950">✅ 是</span>';
  if (v === false || v === 'false') return '<span style="color:#f85149">❌ 否</span>';
  return '<span style="color:#d29922">' + v + '</span>';
}

function pct(v) {
  if (v === null || v === undefined) return '-';
  return Number(v * 100).toFixed(1) + '%';
}

async function startScreen() {
  const pool = document.getElementById('screenPool').value;
  const version = document.getElementById('screenVersion').value;
  const limit = parseInt(document.getElementById('screenLimit').value);
  const btn = document.getElementById('screenBtn');
  const statusEl = document.getElementById('screenStatus');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const resultsEl = document.getElementById('resultsArea');

  btn.disabled = true;
  btn.textContent = '选股中...';
  statusEl.style.display = 'block';
  statusEl.innerHTML = '<div class="loading">正在提交任务</div>';
  progressBar.style.display = 'block';
  progressFill.style.width = '0%';
  resultsEl.innerHTML = '';

  try {
    // 提交选股任务
    const r = await fetch(`${API}/api/screen?version=${version}&pool=${pool}&limit=${limit}`);
    const data = await r.json();
    currentJobId = data.job_id;
    statusEl.innerHTML = '<div style="color:#8b949e;font-size:13px;">任务已启动 (ID: ' + currentJobId + ')，正在筛选...</div>';

    // 轮询状态
    pollTimer = setInterval(async () => {
      try {
        const r2 = await fetch(`${API}/api/screen/status/${currentJobId}`);
        const s = await r2.json();
        progressFill.style.width = s.progress + '%';

        if (s.status === 'running') {
          statusEl.innerHTML = `<div style="color:#8b949e;font-size:13px;">
            已检查 ${s.checked} 只，命中 ${s.matched_count} 只 · 进度 ${s.progress}%
          </div>`;
        }

        if (s.status === 'done' || s.status === 'error') {
          clearInterval(pollTimer);
          btn.disabled = false;
          btn.textContent = '🚀 自动选股';
          progressBar.style.display = 'none';

          if (s.status === 'error') {
            statusEl.innerHTML = '<div class="error-msg">错误: ' + s.error + '</div>';
            return;
          }

          if (s.results.length === 0) {
            statusEl.innerHTML = '<div class="error-msg">未找到符合条件的股票（可尝试切换到基础版或扩大候选池）</div>';
            return;
          }

          statusEl.innerHTML = '<div class="success-box">🎉 筛选完成！找到 <strong>' + s.matched_count + '</strong> 只共振股票（耗时约' + Math.round(s.checked * 0.3) + '秒）</div>';
          renderResults(s.results);
        }
      } catch(e) {
        clearInterval(pollTimer);
        btn.disabled = false;
        btn.textContent = '🚀 自动选股';
        statusEl.innerHTML = '<div class="error-msg">网络错误</div>';
      }
    }, 2000);

  } catch(e) {
    btn.disabled = false;
    btn.textContent = '🚀 自动选股';
    statusEl.innerHTML = '<div class="error-msg">提交任务失败: ' + e.message + '</div>';
  }
}

function renderResults(results) {
  const el = document.getElementById('resultsArea');
  let html = '<div class="section-title">📋 选股结果 (' + results.length + ' 只)</div>';
  for (const item of results) {
    const s = item.信号;
    html += `
    <div class="result-card" onclick="showDetail('${item.code}','${item.name}','${encodeURIComponent(JSON.stringify(s))}','${encodeURIComponent(JSON.stringify(item.卖出信号||{}))}')">
      <div class="result-card-header">
        <div>
          <span class="result-code">${item.code}</span>
          <span class="result-name">${item.name || ''}</span>
        </div>
        <span class="result-price">¥${s.最新价}</span>
      </div>
      <div class="result-badges">
        ${badge(s.捕捞_金叉)} <span style="font-size:12px;color:#8b949e">捕捞金叉</span>
        ${badge(s.神龙_红线金叉)} <span style="font-size:12px;color:#8b949e">神龙金叉</span>
        ${badge(s.捕捞_红柱趋势)} <span style="font-size:12px;color:#8b949e">红柱</span>
        ${badge(s.量能放大)} <span style="font-size:12px;color:#8b949e">放量</span>
        <span class="badge badge-yellow" style="margin-left:4px;">彩柱 ${s.捕捞_彩柱数}</span>
      </div>
      <div class="result-signals">
        <div class="sig-item"><div class="sig-label">DIF</div><div class="sig-val">${fmt(s.捕捞_DIF,4)}</div></div>
        <div class="sig-item"><div class="sig-label">DEA</div><div class="sig-val">${fmt(s.捕捞_DEA,4)}</div></div>
        <div class="sig-item"><div class="sig-label">MACD柱</div><div class="sig-val" style="color:${s.捕捞_HIST>0?'#3fb950':'#f85149'}">${fmt(s.捕捞_HIST,4)}</div></div>
        <div class="sig-item"><div class="sig-label">红线%</div><div class="sig-val">${fmt(s.神龙_Red_pct)}</div></div>
        <div class="sig-item"><div class="sig-label">套牢比例</div><div class="sig-val" style="color:${s.神龙_套牢比例<0.5?'#3fb950':'#f85149'}">${pct(s.神龙_套牢比例)}</div></div>
        <div class="sig-item"><div class="sig-label">MA20</div><div class="sig-val">${boolText(s.股价站上MA20)}</div></div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function showDetail(code, name, signalsEnc, sellEnc) {
  const s = JSON.parse(decodeURIComponent(signalsEnc));
  const sell = JSON.parse(decodeURIComponent(sellEnc));
  const isBasic = s.捕捞_金叉 && s.捕捞_红柱趋势 && s.捕捞_彩柱数 >= 2 && s.神龙_红线金叉 && s.神龙_红柱上升;
  const isAdvanced = isBasic && s.神龙_套牢比例 < 0.5 && s.股价站上MA20 && s.MA20向上 && s.量能放大;

  const modal = document.getElementById('detailModal');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-header">
      <div>
        <div style="font-size:20px;font-weight:700;">${code}</div>
        <div style="color:#8b949e;font-size:13px;">${name}</div>
      </div>
      <button class="modal-close" onclick="this.closest('.stock-detail-modal').style.display='none'">×</button>
    </div>

    <div class="共振-badge ${isBasic ? '共振-yes' : '共振-no'}" style="text-align:center;display:block;">
      ${isBasic ? '🎯 基础版共振' : '❌ 暂无共振'} ${isAdvanced ? ' · 进阶版✅' : ''}
    </div>

    <div class="section-title">🐟 捕捞季节</div>
    <ul class="cond-list">
      <li><span class="cond-name">DIF / DEA</span><span class="cond-val">${fmt(s.捕捞_DIF,4)} / ${fmt(s.捕捞_DEA,4)}</span></li>
      <li><span class="cond-name">MACD柱 (HIST)</span><span class="cond-val" style="color:${s.捕捞_HIST>0?'#3fb950':'#f85149'}">${fmt(s.捕捞_HIST,4)}</span></li>
      <li><span class="cond-name">金叉信号</span>${boolText(s.捕捞_金叉)}</li>
      <li><span class="cond-name">红柱趋势</span>${boolText(s.捕捞_红柱趋势)}</li>
      <li><span class="cond-name">彩柱数 (≥2)</span><span class="cond-val" style="color:${s.捕捞_彩柱数>=2?'#3fb950':'#f85149'}">${s.捕捞_彩柱数}</span></li>
    </ul>

    <div class="section-title">🐉 神龙筹码</div>
    <ul class="cond-list">
      <li><span class="cond-name">红线 / 橙线 / 紫线</span><span class="cond-val">${fmt(s.神龙_Red_pct)} / ${fmt(s.神龙_Orange_pct)} / ${fmt(s.神龙_Purple_pct)}</span></li>
      <li><span class="cond-name">红线金叉</span>${boolText(s.神龙_红线金叉)}</li>
      <li><span class="cond-name">红柱上升</span>${boolText(s.神龙_红柱上升)}</li>
      <li><span class="cond-name">套牢比例 (&lt;50%)</span><span class="cond-val" style="color:${s.神龙_套牢比例<0.5?'#3fb950':'#f85149'}">${pct(s.神龙_套牢比例)}</span></li>
    </ul>

    <div class="section-title">📐 趋势与量能</div>
    <ul class="cond-list">
      <li><span class="cond-name">最新价</span><span class="cond-val" style="color:#3fb950;font-size:16px;">¥${s.最新价}</span></li>
      <li><span class="cond-name">日期</span><span class="cond-val">${s.日期}</span></li>
      <li><span class="cond-name">股价站上MA20</span>${boolText(s.股价站上MA20)}</li>
      <li><span class="cond-name">MA20向上</span>${boolText(s.MA20向上)}</li>
      <li><span class="cond-name">量能放大</span>${boolText(s.量能放大)}</li>
    </ul>

    <div class="section-title">🚨 卖出信号</div>
    <ul class="cond-list">
      <li><span class="cond-name">跌破MA20预警</span>${boolText(sell['触发卖出3_跌破MA20'])}</li>
      <li><span class="cond-name">触发卖出条件数</span><span class="cond-val" style="color:#f85149">${Object.values(sell).filter(v=>v===true).length} / 3</span></li>
    </ul>
  `;
  modal.style.display = 'flex';
}

async function querySignal() {
  const code = document.getElementById('stockCode').value.trim();
  if (!code) return;
  const el = document.getElementById('singleResult');
  el.innerHTML = '<div class="loading">加载中</div>';
  try {
    const r = await fetch(`${API}/api/signal/${code}`);
    if (!r.ok) { el.innerHTML = '<div class="error-msg">股票代码不存在</div>'; return; }
    const data = await r.json();
    const s = data.signals;
    const isBasic = data.basic共振;
    const isAdvanced = data.advanced共振;
    el.innerHTML = `
    <div class="result-card" style="cursor:default;">
      <div class="result-card-header">
        <div>
          <span class="result-code">${data.code}</span>
          <span class="result-name">${data.ts_code}</span>
        </div>
        <span class="result-price">¥${s.最新价}</span>
      </div>
      <div class="共振-badge ${isBasic ? '共振-yes' : '共振-no'}" style="display:inline-block;">
        ${isBasic ? '🎯 基础版共振' : '❌ 暂无共振'} ${isAdvanced ? '· 进阶版✅' : ''}
      </div>
      <div class="result-badges" style="margin-top:12px;">
        ${badge(s.捕捞_金叉)} 捕捞金叉
        ${badge(s.神龙_红线金叉)} 神龙金叉
        ${badge(s.量能放大)} 放量
        <span class="badge badge-yellow">彩柱 ${s.捕捞_彩柱数}</span>
      </div>
      <div class="result-signals">
        <div class="sig-item"><div class="sig-label">套牢比例</div><div class="sig-val" style="color:${s.神龙_套牢比例<0.5?'#3fb950':'#f85149'}">${pct(s.神龙_套牢比例)}</div></div>
        <div class="sig-item"><div class="sig-label">站上MA20</div><div class="sig-val">${boolText(s.股价站上MA20)}</div></div>
        <div class="sig-item"><div class="sig-label">MA20向上</div><div class="sig-val">${boolText(s.MA20向上)}</div></div>
        <div class="sig-item"><div class="sig-label">红线%</div><div class="sig-val">${fmt(s.神龙_Red_pct)}</div></div>
        <div class="sig-item"><div class="sig-label">MACD柱</div><div class="sig-val" style="color:${s.捕捞_HIST>0?'#3fb950':'#f85149'}">${fmt(s.捕捞_HIST,4)}</div></div>
        <div class="sig-item"><div class="sig-label">日期</div><div class="sig-val">${s.日期}</div></div>
      </div>
    </div>`;
  } catch(e) {
    el.innerHTML = '<div class="error-msg">网络错误，请稍后重试</div>';
  }
}

function clearResults() {
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('resultsArea').innerHTML = '';
  document.getElementById('screenStatus').style.display = 'none';
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('screenBtn').disabled = false;
  document.getElementById('screenBtn').textContent = '🚀 自动选股';
}

document.getElementById('stockCode').addEventListener('keydown', e => { if (e.key === 'Enter') querySignal(); });
</script>
</body>
</html>
